name: Build and Push Image to container registry

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_FILE: dockerfile/Dockerfile.api
  IMAGE_NAME: ${{ secrets.CR_ENDPOINT }}/${{ secrets.CR_REPOSITORY_API }}

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Lint & Test
  # ──────────────────────────────────────────────

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install

      - name: Run Prettier
        run: npx prettier --check .

      # - name: Run ESLint
      #   run: npx eslint .

      - name: Run Tests
        run: npm test || true

  # ──────────────────────────────────────────────
  # JOB 2 — Build Docker Image
  # ──────────────────────────────────────────────

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set Image Tag (Auto Increment)
        id: tag
        run: |

          LATEST_TAG=$(aws ecr describe-images \
            --repository-name ${{ secrets.CR_REPOSITORY_API }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'imageDetails[*].imageTags[*]' \
            --output text | tr '\t' '\n' | grep -E '^0\.0\.0\.[0-9]+$' | sort -V | tail -n 1)

          echo "Latest tag: $LATEST_TAG"

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "None" ]; then
            NEW_TAG="0.0.0.1"
          else
            PATCH="${LATEST_TAG##*.}"
            NEW_TAG="0.0.0.$((PATCH + 1))"
          fi

          echo "TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker buildx build \
            -f $DOCKER_FILE \
            -t $IMAGE_NAME:${{ steps.tag.outputs.TAG }} \
            --load \
            .

      - name: Save Docker Image
        run: |
          docker save $IMAGE_NAME:${{ steps.tag.outputs.TAG }} | gzip > image.tar.gz

      - name: Upload Docker Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 3 — Security Scan
  # ──────────────────────────────────────────────

  scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Docker Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load < image.tar.gz

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ──────────────────────────────────────────────
  # JOB 4 — Push to ECR
  # ──────────────────────────────────────────────

  push:
    name: Push Image to ECR
    runs-on: ubuntu-latest
    needs: [build, scan]

    env:
      IMAGE_NAME: ${{ secrets.CR_ENDPOINT }}/${{ secrets.CR_REPOSITORY_API }}

    steps:
      - name: Download Docker Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load < image.tar.gz

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.CR_ENDPOINT }}

      - name: Push Image to ECR
        run: |
          docker push $IMAGE_NAME:${{ needs.build.outputs.image_tag }}

      - name: Deployment Summary
        run: |
          echo "### Image pushed successfully" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
