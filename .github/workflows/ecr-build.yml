name: Build and Push Image to ECR

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Lint & Code Checks
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .

      - name: Run ESLint
        run: npx eslint .

  # ──────────────────────────────────────────────
  # JOB 2 — Build Docker Image
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Image Tag
        id: tag
        run: |
          TAG=${{ github.run_number }}
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
          -t $IMAGE_NAME:${{ steps.tag.outputs.TAG }} \
          -t $IMAGE_NAME:latest .

  # ──────────────────────────────────────────────
  # JOB 3 — Security Scan
  # ──────────────────────────────────────────────
  scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Image for Scan
        run: |
          docker build \
          -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.build.outputs.image_tag }} .

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.build.outputs.image_tag }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ──────────────────────────────────────────────
  # JOB 4 — Push to ECR
  # ──────────────────────────────────────────────
  push:
    name: Push Image to ECR
    runs-on: ubuntu-latest
    needs: [build, scan]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.build.outputs.image_tag }} \
          -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.build.outputs.image_tag }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Deployment Summary
        run: |
          echo "### Image pushed successfully" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
