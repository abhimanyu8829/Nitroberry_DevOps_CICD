api:
  dashboard: true
  debug: false

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
          permanent: true
  https:
    address: ":443"
  traefik:
    address: ":8080"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: nb_network
  file:
    filename: /traefik.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${LETSENCRYPT_EMAIL}
      storage: acme.json
      httpChallenge:
        entryPoint: http

log:
  level: INFO
  format: common

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  bufferingSize: 100

http:
  routers:
    dashboard:
      rule: PathPrefix(`/`) || PathPrefix(`/dashboard`)
      entryPoints:
        - traefik
      service: api@internal
      middlewares:
        - traefik-auth

  middlewares:
    traefik-auth:
      basicAuth:
        users:
          - admin:$2y$05$shd4GdFEbdulweMyPfZYkuVU0fXXBiJNebkdz9lDGfqD6oKEmE.ZW