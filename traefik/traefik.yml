api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    swarmMode: true
    network: nb_network
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

certificatesResolvers:
  myresolver:
    acme:
      email: "TODO_YOUR_EMAIL@example.com"
      storage: "/acme/acme.json"
      tlsChallenge: {}

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
