services:
  nb-redis:
    image: redis:8-alpine
    container_name: nb-redis
    restart: always
    hostname: ${REDIS_HOST}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nb_network

  nb-worker:
    image: ${CR_REGISTRY}/nitroberry/nb-worker:0.0.0.18
    container_name: nb-worker
    restart: always
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    depends_on:
      nb-redis:
        condition: service_healthy

  nb-cron:
    image: ${CR_REGISTRY}/nitroberry/nb-cron:0.0.0.1
    container_name: nb-cron
    restart: always
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    depends_on:
      nb-redis:
        condition: service_healthy

  nb-socket:
    image: ${CR_REGISTRY}/nitroberry/nb-socket:0.0.0.2
    container_name: nb-socket
    restart: always
    env_file:
      - ./.prod/prod.api.env
    expose:
      - "9090"
    networks:
      - nb_network
    depends_on:
      nb-redis:
        condition: service_healthy

  nb-api:
    image: ${CR_REGISTRY}/nitroberry/nb-api:0.0.0.87
    container_name: nb-api
    restart: always
    env_file:
      - ./.prod/prod.api.env
    expose:
      - "80"
    networks:
      - nb_network
    depends_on:
      nb-redis:
        condition: service_healthy

  nb-nginx:
    image: ${CR_REGISTRY}/nitroberry/nb-api-nginx:0.0.0.14
    container_name: nb-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./.prod/prod.nginx.env
    volumes:
      - /root/deployment/ssl:/etc/nginx/ssl:ro
    networks:
      - nb_network
    depends_on:
      - nb-api
      - nb-socket

  nb-loki:
    image: grafana/loki:2.9.0
    container_name: nb-loki
    restart: always
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  nb-promtail:
    image: grafana/promtail:2.9.0
    container_name: nb-promtail
    restart: always
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allows Promtail to see other containers
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - monitoring
    depends_on:
      - nb-loki

  nb-prometheus:
    image: prom/prometheus:latest
    container_name: nb-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus-config.yaml:/etc/prometheus/prometheus.yaml
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: nb-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - nb-loki
      - nb-prometheus
    networks:
      - monitoring

volumes:
  redis_data:
  loki_data:
  grafana_data:


networks:
  nb_network:
    driver: bridge
  monitoring:
    driver: bridge
