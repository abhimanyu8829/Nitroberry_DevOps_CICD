version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    ports:
      - target: 80
        published: 80
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - nb_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Note: HTTPS (port 443) and Let's Encrypt volumes omitted since dealing with raw IP

  nb-redis:
    image: redis:8-alpine
    hostname: ${REDIS_HOST:-nb-redis}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-safepassword} --port ${REDIS_PORT:-6379}
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-safepassword} ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nb_network

  nb-worker:
    image: ${CR_REGISTRY:-fallback}/nitroberry:latest
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network

  nb-cron:
    image: ${CR_REGISTRY:-fallback}/nitroberry:latest
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      placement:
        constraints: [node.role == manager]

  nb-socket:
    image: ${CR_REGISTRY:-fallback}/nitroberry:latest
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        # Since we use an IP, separate it using PathPrefix
        - "traefik.http.routers.socket.rule=PathPrefix(`/socket`)"
        - "traefik.http.services.socket.loadbalancer.server.port=9090"
        - "traefik.http.services.socket.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.socket.loadbalancer.sticky.cookie.name=socket_sticky"

  nb-api:
    image: ${CR_REGISTRY:-fallback}/nitroberry:latest
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        # The main API is available on the root path of the IP
        - "traefik.http.routers.api.rule=PathPrefix(`/`)"
        - "traefik.http.services.api.loadbalancer.server.port=80"
        - "traefik.http.routers.api.middlewares=rate-limit@file,secure-headers@file"

# Removed Loki and Grafana volumes
volumes:
  redis_data:

networks:
  nb_network:
    driver: overlay
