version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8080
        published: 8080
        mode: host
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt Configuration
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=abhimanyucentral@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certificates:/letsencrypt"
    networks:
      - nb_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      labels:
        # Traefik dashboard is accessible on port 8080 because --api.insecure=true is set
        - "traefik.enable=true"

  nb-redis:
    image: redis:8-alpine
    hostname: ${REDIS_HOST:-nb-redis}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-safepassword} --port ${REDIS_PORT:-6379}
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-safepassword} ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  nb-worker:
    image: ${CR_REGISTRY}/nitroberry/nb-worker:0.0.0.18
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  nb-cron:
    image: ${CR_REGISTRY}/nitroberry/nb-cron:0.0.0.1
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      # Cron jobs generally should run as singletons to avoid duplicate execution
      placement:
        constraints:
          - node.role == manager

  nb-socket:
    image: ${CR_REGISTRY}/nitroberry/nb-socket:0.0.0.2
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.nbsocket.rule=Host(`44.219.100.191`) && PathPrefix(`/socket`)"
        - "traefik.http.routers.nbsocket.entrypoints=websecure"
        - "traefik.http.routers.nbsocket.tls.certresolver=myresolver"
        - "traefik.http.services.nbsocket.loadbalancer.server.port=9090"
        # Optional: enable sticky sessions if your socket implementation needs it
        - "traefik.http.services.nbsocket.loadbalancer.sticky.cookie=true"

  nb-api:
    image: ${CR_REGISTRY}/nitroberry/nb-api:0.0.0.87
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 4
      resources:
        limits:
          cpus: '0.5' # Example limits to allow autoscaling measurements
          memory: 512M
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.nbapi.rule=Host(`44.219.100.191`)"
        - "traefik.http.routers.nbapi.entrypoints=websecure"
        - "traefik.http.routers.nbapi.tls.certresolver=myresolver"
        - "traefik.http.services.nbapi.loadbalancer.server.port=80"
        
        # Rate Limiting configuration (100 req per minute -> ~1.6 req/s average, burst=50)
        - "traefik.http.middlewares.nbapi-ratelimit.ratelimit.average=100"
        - "traefik.http.middlewares.nbapi-ratelimit.ratelimit.burst=50"
        - "traefik.http.middlewares.nbapi-ratelimit.ratelimit.period=1m"
        - "traefik.http.routers.nbapi.middlewares=nbapi-ratelimit"

  nb-loki:
    image: grafana/loki:2.9.0
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  nb-promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - monitoring
    deploy:
      mode: global # Promtail needs to run on EVERY node to collect logs
      restart_policy:
        condition: any

  nb-prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus-config.yaml:/etc/prometheus/prometheus.yaml
    networks:
      - monitoring
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      labels:
        # Exposing Grafana via Traefik as an example
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`44.219.100.191`) && PathPrefix(`/grafana`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=myresolver"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  redis_data:
  loki_data:
  grafana_data:
  traefik-certificates:

networks:
  nb_network:
    driver: overlay
  monitoring:
    driver: overlay
