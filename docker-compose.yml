version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "7070:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
      - ./traefik/traefik.yml:/traefik.yml:ro
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/traefik.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.traefik.address=:8080
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-secure.entrypoints=websecure"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-secure.service=api@internal"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_AUTH}"

  nb-redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nb-api:
    image: ${CR_REGISTRY}/nitroberry/nb-api:${API_VERSION}
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: ${API_REPLICAS:-2}
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=80"

  nb-worker:
    image: ${CR_REGISTRY}/nitroberry/nb-worker:${WORKER_VERSION}
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  nb-cron:
    image: ${CR_REGISTRY}/nitroberry/nb-cron:${CRON_VERSION}
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  nb-socket:
    image: ${CR_REGISTRY}/nitroberry/nb-socket:${SOCKET_VERSION}
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.socket.rule=Host(`socket.${DOMAIN}`)"
      - "traefik.http.routers.socket.entrypoints=websecure"
      - "traefik.http.routers.socket.tls=true"
      - "traefik.http.services.socket.loadbalancer.server.port=9090"

networks:
  nb_network:
    driver: overlay
    attachable: true

volumes:
  redis_data: