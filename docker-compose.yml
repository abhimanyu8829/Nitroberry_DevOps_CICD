version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--entrypoints.web.address=:80"
    ports:
      - target: 80
        published: 80
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nb_network
    deploy:
      mode: global

  nb-redis:
    image: redis:8-alpine
    hostname: ${REDIS_HOST:-nb-redis}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-safepassword} --port ${REDIS_PORT:-6379}
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-safepassword} ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nb_network

  nb-api:
    image: ${CR_REGISTRY:-fallback}/nitroberry:latest
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=PathPrefix(`/`)"
        - "traefik.http.services.api.loadbalancer.server.port=80"

volumes:
  redis_data:

networks:
  nb_network:
    driver: overlay
