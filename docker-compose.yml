version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nb_network
    deploy:
      mode: global
      labels:
        - "traefik.enable=false"

  nb-redis:
    image: redis:8-alpine
    hostname: ${REDIS_HOST:-nb-redis}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-safepassword} --port ${REDIS_PORT:-6379}
    networks:
      - nb_network
    deploy:
      labels:
        - "traefik.enable=false"

  nb-api:
    image: ${CR_REGISTRY:-fallback}/nitroberry:latest
    env_file:
      - ./.prod/prod.api.env
    networks:
      - nb_network
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=PathPrefix(`/`)"
        - "traefik.http.routers.api.entrypoints=web"
        - "traefik.http.services.api.loadbalancer.server.port=80"

volumes:
  redis_data:

networks:
  nb_network:
    driver: overlay
